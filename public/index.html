<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title> Kyndryl - OXXO</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/foto.css">
</head>
<body>
  <div class="container">
    <div class="card" id="mainCard">
      <div class="card-header">
        <img src="/kyndryl/kyndryl-logo.png" alt="Kyndryl" class="logo">
    
      
      </div>

      <!-- Camera / Upload -->
      <div class="camera-section" id="cameraSection">
        <button class="camera-btn" id="openCameraBtn">
          Tomar Foto
        </button>
        <div class="upload-area" id="uploadArea">
          <p>O arrastra una imagen aquí / haz clic para subir</p>
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
        </div>
      </div>

      <!-- Preview -->
      <div class="preview-container" id="previewContainer">
        <img id="previewImage" src="" alt="Vista previa">
        <button class="remove-btn" id="removeBtn">&times;</button>
      </div>

      <!-- Generate -->
      <div class="generate-section">
        <button class="btn btn-primary btn-full btn-lg" id="generateBtn" disabled>
          Generar Mi Foto
        </button>
      </div>

      <!-- Result -->
      <div class="result-section" id="resultSection">
        <h3 class="result-title">Tu foto está lista</h3>
        <img id="resultImage" class="result-image" src="" alt="Resultado">

        <div class="qr-display" id="qrDisplay">
          <p style="font-weight: 600;">Escanea para descargar</p>
          <img id="downloadQr" src="" alt="QR Descarga" style="width: 150px; height: 150px;">
        </div>

        <div class="result-actions">
          <button class="btn btn-secondary btn-sm" id="downloadBtn">
            Descargar
          </button>
          <button class="btn btn-success btn-sm" id="newPhotoBtn">
            Nueva Foto
          </button>
        </div>
      </div>
    </div>

    <!-- Camera Modal -->
    <div class="camera-modal" id="cameraModal">
      <video id="cameraVideo" autoplay playsinline></video>
      <canvas id="cameraCanvas"></canvas>
      <div class="camera-controls">
        <button class="close-camera-btn" id="closeCameraBtn">Cancelar</button>
        <button class="capture-btn" id="captureBtn"></button>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <p>Generando tu foto...</p>
    </div>
  </div>

  <script>
    // ── Toast ──
    function showToast(message, type = 'success', duration = 3000) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(30px)';
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    function showLoading(msg = 'Procesando...') {
      const o = document.getElementById('loadingOverlay');
      if (o) { o.querySelector('p').textContent = msg; o.classList.add('active'); }
    }
    function hideLoading() {
      const o = document.getElementById('loadingOverlay');
      if (o) o.classList.remove('active');
    }

    // ── State ──
    let capturedFile = null;
    let cameraStream = null;

    // ── Prompt ──
    function buildPrompt() {
      return `Se te proporcionan DOS imágenes de referencia:
1) La PRIMERA imagen es la foto real de la persona: usa su rostro, piel, cabello y rasgos faciales EXACTAMENTE iguales, sin modificarlos.
2) La SEGUNDA imagen es la playera oficial de empleado de OXXO que debes vestirle a la persona: cópiala con fidelidad total — color rojo idéntico, cuello amarillo, puños amarillos, logo OXXO en el pecho, cierre frontal vertical y bolsillos delanteros tal como aparecen en la referencia.

Genera un retrato fotorrealista donde la persona de la PRIMERA imagen aparece vistiendo EXACTAMENTE la playera de la SEGUNDA imagen. La playera debe verse limpia, planchada y bien ajustada. La persona debe aparecer sonriendo amigablemente, con actitud de empleado de tienda de conveniencia atendiendo al cliente. El fondo debe mostrar el interior luminoso de una tienda OXXO con estantes llenos de productos, refrigeradores con bebidas e iluminación fluorescente brillante. Iluminación cálida y natural. Estilo fotorrealista, profesional y cotidiano. NO agregues ningún texto, nombre, ni letras superpuestas en la imagen; el resultado debe ser solo la fotografía limpia sin tipografía añadida.`;
    }

    // ── Camera ──
    document.getElementById('openCameraBtn').addEventListener('click', async () => {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        document.getElementById('cameraVideo').srcObject = cameraStream;
        document.getElementById('cameraModal').classList.add('active');
      } catch (err) {
        showToast('No se pudo acceder a la cámara', 'error');
      }
    });

    document.getElementById('captureBtn').addEventListener('click', () => {
      const video = document.getElementById('cameraVideo');
      const canvas = document.getElementById('cameraCanvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => {
        capturedFile = new File([blob], 'capture.png', { type: 'image/png' });
        document.getElementById('previewImage').src = URL.createObjectURL(blob);
        document.getElementById('previewContainer').classList.add('active');
        document.getElementById('cameraSection').style.display = 'none';
        checkCanGenerate();
        closeCamera();
      }, 'image/png');
    });

    document.getElementById('closeCameraBtn').addEventListener('click', closeCamera);

    function closeCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      document.getElementById('cameraModal').classList.remove('active');
    }

    // ── File Upload ──
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--gold)'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'var(--gray-light)'; });
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.style.borderColor = 'var(--gray-light)';
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files.length > 0) handleFile(fileInput.files[0]); });

    function handleFile(file) {
      if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
        showToast('Solo se permiten imágenes JPG, PNG o WEBP', 'error');
        return;
      }
      capturedFile = file;
      document.getElementById('previewImage').src = URL.createObjectURL(file);
      document.getElementById('previewContainer').classList.add('active');
      document.getElementById('cameraSection').style.display = 'none';
      checkCanGenerate();
    }

    // Remove preview
    document.getElementById('removeBtn').addEventListener('click', () => {
      capturedFile = null;
      document.getElementById('previewContainer').classList.remove('active');
      document.getElementById('cameraSection').style.display = 'block';
      checkCanGenerate();
    });

    function checkCanGenerate() {
      document.getElementById('generateBtn').disabled = !capturedFile;
    }

    // ── Generate ──
    document.getElementById('generateBtn').addEventListener('click', async () => {
      if (!capturedFile) return;

      showLoading('Generando tu foto...');

      const formData = new FormData();
      formData.append('image', capturedFile);
      formData.append('prompt', buildPrompt());
      formData.append('participantUuid', '');
      formData.append('plecaVersion', 'oxxo');

      try {
        const response = await fetch('/api/generate', { method: 'POST', body: formData });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Error generando imagen');

        document.getElementById('resultImage').src = data.image;
        if (data.qrCode) document.getElementById('downloadQr').src = data.qrCode;
        document.getElementById('resultSection').classList.add('active');

        // Hide form
        document.getElementById('cameraSection').style.display = 'none';
        document.getElementById('previewContainer').classList.remove('active');
        document.querySelector('.generate-section').style.display = 'none';

        document.getElementById('downloadBtn').dataset.image = data.image;

        hideLoading();
        showToast('¡Tu foto está lista!', 'success');
      } catch (error) {
        hideLoading();
        showToast(error.message || 'Error al generar imagen', 'error');
      }
    });

    // ── Download ──
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const imageData = document.getElementById('downloadBtn').dataset.image;
      if (!imageData) return;
      const link = document.createElement('a');
      link.href = imageData;
      link.download = `Foto_OXXO_${Date.now()}.png`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    // ── New Photo ──
    document.getElementById('newPhotoBtn').addEventListener('click', () => {
      capturedFile = null;
      document.getElementById('resultSection').classList.remove('active');
      document.getElementById('cameraSection').style.display = 'block';
      document.querySelector('.generate-section').style.display = 'block';
      document.getElementById('generateBtn').disabled = true;
      document.getElementById('previewContainer').classList.remove('active');
      document.getElementById('previewImage').src = '';
      document.getElementById('resultImage').src = '';
      document.getElementById('downloadQr').src = '';
      delete document.getElementById('downloadBtn').dataset.image;
    });
  </script>
</body>
</html>
